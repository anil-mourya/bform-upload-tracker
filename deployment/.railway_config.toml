[build]
# Build configuration
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
# Deployment settings
startCommand = "npm start"
healthCheckPath = "/health"
healthCheckInterval = 30
healthCheckTimeout = 10
restartPolicy = "always"

[environment]
# Environment-specific settings
PORT = "5000"
NODE_ENV = "production"
LOG_LEVEL = "info"
# Database configuration
DATABASE_HOST = "postgres.railway.internal"
DATABASE_PORT = "5432"
DATABASE_NAME = "bform_db"
DATABASE_USER = "bform_user"
# Add DATABASE_PASSWORD via Railway dashboard

[services]
[services.postgres]
image = "postgres:15"
version = "15"
variables = {
  POSTGRES_DB = "bform_db",
  POSTGRES_USER = "bform_user",
  POSTGRES_INITDB_ARGS = "--encoding=UTF8 --locale=en_US.UTF-8"
}

[volumes]
postgres = "/var/lib/postgresql/data"

[networking]
[networking.backend]
port = 5000
protocol = "TCP"
exposure = "public"

[networking.frontend]
port = 3000
protocol = "TCP"
exposure = "public"

[networking.postgres]
port = 5432
protocol = "TCP"
exposure = "private"

[monitoring]
enabled = true
logLevel = "info"
metricsEnabled = true

[[monitoring.alerts]]
name = "High Memory Usage"
metric = "memory"
threshold = 85
unit = "percent"
duration = 300

[[monitoring.alerts]]
name = "High CPU Usage"
metric = "cpu"
threshold = 80
unit = "percent"
duration = 300

[[monitoring.alerts]]
name = "Service Down"
metric = "uptime"
threshold = 0
duration = 60
