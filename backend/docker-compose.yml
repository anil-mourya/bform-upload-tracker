version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: bform-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-bform_tracker}
      MYSQL_USER: ${DB_USER:-bform_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bform_password}
      TZ: 'UTC'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - bform-network

  # Node.js Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bform-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-bform_user}
      DB_PASSWORD: ${DB_PASSWORD:-bform_password}
      DB_NAME: ${DB_NAME:-bform_tracker}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
      - node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      timeout: 10s
      retries: 5
      interval: 30s
    networks:
      - bform-network

volumes:
  mysql_data:
    driver: local
  node_modules:
    driver: local

networks:
  bform-network:
    driver: bridge
